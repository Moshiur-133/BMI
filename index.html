<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional BMI Calculator</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<style>
    /* Google Font */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    transition:.4s;
}

.container{
    width:100%;
    max-width:520px;
}

.card{
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(20px);
    border-radius:25px;
    padding:30px;
    box-shadow:0 10px 40px rgba(0,0,0,.25);
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    color:#fff;
    font-size:30px;
    font-weight:700;
}

.header p{
    color:#eee;
}

.theme-area{
    text-align:right;
    margin-bottom:20px;
}

#themeToggle{
    background:#fff;
    border:none;
    padding:10px 18px;
    border-radius:30px;
    cursor:pointer;
    font-weight:600;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    color:#fff;
    margin-bottom:8px;
    font-weight:600;
}

.input-group input,
.input-group select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:16px;
    outline:none;
}

.row{
    display:flex;
    gap:15px;
    margin-bottom:18px;
}

.row div{
    flex:1;
}

.hidden{
    display:none;
}

.buttons{
    display:flex;
    gap:15px;
    margin-top:15px;
}

.buttons button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:17px;
    font-weight:bold;
    transition:.3s;
}

#calculateBtn{
    background:#2563eb;
    color:white;
}

#calculateBtn:hover{
    background:#1d4ed8;
}

#resetBtn{
    background:#ef4444;
    color:white;
}

#resetBtn:hover{
    background:#dc2626;
}

.result{
    text-align:center;
    margin-top:30px;
}

#bmiValue{
    font-size:55px;
    color:#fff;
}

#bmiStatus{
    color:#fff;
    margin-top:10px;
}

#idealWeight{
    color:#f3f3f3;
    margin-top:10px;
}

.gauge{
    display:flex;
    justify-content:center;
    margin-top:25px;
}

.history{
    margin-top:35px;
}

.history h2{
    color:#fff;
    margin-bottom:15px;
}

.history ul{
    list-style:none;
}

.history li{
    background:rgba(255,255,255,.2);
    color:white;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

/* Dark Mode */

.dark{
    background:#111827 !important;
}

.dark .card{
    background:#1f2937;
}

.dark input,
.dark select{
    background:#374151;
    color:white;
}

.dark #themeToggle{
    background:#374151;
    color:white;
}

@media(max-width:600px){

.card{
    padding:20px;
}

.header h1{
    font-size:24px;
}

.buttons{
    flex-direction:column;
}

.row{
    flex-direction:column;
}

}
    
    
</style>

<body class="bg-gradient-to-br from-blue-500 via-indigo-500 to-purple-600 min-h-screen flex justify-center items-center p-5">

<div class="container">

    <!-- Card -->
    <div class="card">

        <!-- Header -->
        <div class="header">
            <h1>BMI Calculator</h1>
            <p>Calculate your Body Mass Index instantly</p>
        </div>

        <!-- Theme Toggle -->
        <div class="theme-area">
            <button id="themeToggle">
                 Dark Mode
            </button>
        </div>

        <!-- Gender -->
        <div class="input-group">

            <label>Gender</label>

            <select id="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>

        </div>

        <!-- Age -->
        <div class="input-group">

            <label>Age</label>

            <input
            type="number"
            id="age"
            placeholder="Enter age">

        </div>

        <!-- Height Unit -->
        <div class="input-group">

            <label>Height Unit</label>

            <select id="unit">

                <option value="cm">Centimeter</option>

                <option value="ft">Feet / Inch</option>

            </select>

        </div>

        <!-- Height CM -->

        <div class="input-group" id="cmBox">

            <label>Height (cm)</label>

            <input
            type="number"
            id="heightCm"
            placeholder="170">

        </div>

        <!-- Height Feet -->

        <div class="row hidden" id="ftBox">

            <div>

                <label>Feet</label>

                <input
                type="number"
                id="feet"
                placeholder="5">

            </div>

            <div>

                <label>Inch</label>

                <input
                type="number"
                id="inch"
                placeholder="8">

            </div>

        </div>

        <!-- Weight -->

        <div class="input-group">

            <label>Weight (kg)</label>

            <input
            type="number"
            id="weight"
            placeholder="70">

        </div>

        <!-- Buttons -->

        <div class="buttons">

            <button id="calculateBtn">
                Calculate BMI
            </button>

            <button id="resetBtn">
                Reset
            </button>

        </div>

        <!-- Result -->

        <div class="result">

            <h2 id="bmiValue">
                --
            </h2>

            <h3 id="bmiStatus">
                Waiting...
            </h3>

            <p id="idealWeight"></p>

        </div>

        <!-- Gauge -->

        <div class="gauge">

            <canvas
            id="gaugeCanvas"
            width="250"
            height="250"></canvas>

        </div>

        <!-- History -->

        <div class="history">

            <h2>BMI History</h2>

            <ul id="historyList">

            </ul>

        </div>

    </div>

</div>

<!-- Gauge JS -->
<script src="gauge.js"></script>

<!-- Main JS -->
<script>
    // =============================
// Professional BMI Calculator
// =============================

// Elements
const unit = document.getElementById("unit");
const cmBox = document.getElementById("cmBox");
const ftBox = document.getElementById("ftBox");

const heightCm = document.getElementById("heightCm");
const feet = document.getElementById("feet");
const inch = document.getElementById("inch");

const weight = document.getElementById("weight");
const age = document.getElementById("age");

const bmiValue = document.getElementById("bmiValue");
const bmiStatus = document.getElementById("bmiStatus");
const idealWeight = document.getElementById("idealWeight");

const calculateBtn = document.getElementById("calculateBtn");
const resetBtn = document.getElementById("resetBtn");
const historyList = document.getElementById("historyList");

const themeToggle = document.getElementById("themeToggle");

// Height Unit Toggle
unit.addEventListener("change", () => {
    if (unit.value === "cm") {
        cmBox.classList.remove("hidden");
        ftBox.classList.add("hidden");
    } else {
        cmBox.classList.add("hidden");
        ftBox.classList.remove("hidden");
    }
});

// Calculate Button
calculateBtn.addEventListener("click", calculateBMI);

function calculateBMI() {

    let height;

    if (unit.value === "cm") {

        height = parseFloat(heightCm.value) / 100;

    } else {

        let totalInches =
            (parseFloat(feet.value) * 12) +
            parseFloat(inch.value);

        height = totalInches * 0.0254;
    }

    let w = parseFloat(weight.value);

    if (!height || !w) {
        alert("Please enter valid height and weight.");
        return;
    }

    let bmi = w / (height * height);

    bmi = bmi.toFixed(1);

    bmiValue.innerHTML = bmi;

    let status = "";

    if (bmi < 18.5) {

        status = "🟡 Underweight";

    } else if (bmi < 25) {

        status = "🟢 Normal";

    } else if (bmi < 30) {

        status = "🟠 Overweight";

    } else {

        status = "🔴 Obese";

    }

    bmiStatus.innerHTML = status;

    // Ideal Weight
    let min = (18.5 * height * height).toFixed(1);
    let max = (24.9 * height * height).toFixed(1);

    idealWeight.innerHTML =
        `Ideal Weight: ${min} kg - ${max} kg`;

    saveHistory(bmi, status);

    // Gauge (gauge.js এ থাকবে)
    if (typeof drawGauge === "function") {
        drawGauge(parseFloat(bmi));
    }
}

// Reset
resetBtn.addEventListener("click", () => {

    heightCm.value = "";
    feet.value = "";
    inch.value = "";
    weight.value = "";
    age.value = "";

    bmiValue.innerHTML = "--";
    bmiStatus.innerHTML = "Waiting...";
    idealWeight.innerHTML = "";

});

// Dark Mode
themeToggle.addEventListener("click", () => {

    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {

        themeToggle.innerHTML = "☀ Light Mode";

    } else {

        themeToggle.innerHTML = "🌙 Dark Mode";

    }

});

// ==========================
// Local Storage History
// ==========================

function saveHistory(bmi, status) {

    let history =
        JSON.parse(localStorage.getItem("bmiHistory")) || [];

    history.unshift({
        bmi,
        status,
        date: new Date().toLocaleString()
    });

    if (history.length > 5)
        history.pop();

    localStorage.setItem(
        "bmiHistory",
        JSON.stringify(history)
    );

    loadHistory();
}

function loadHistory() {

    historyList.innerHTML = "";

    let history =
        JSON.parse(localStorage.getItem("bmiHistory")) || [];

    history.forEach(item => {

        let li = document.createElement("li");

        li.innerHTML =
            `<strong>${item.bmi}</strong> - ${item.status}<br>
             <small>${item.date}</small>`;

        historyList.appendChild(li);

    });

}

loadHistory();
    
    
    
</script>

</body>
</html>
